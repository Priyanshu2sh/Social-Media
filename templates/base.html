<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social</title>
    <script src="https://kit.fontawesome.com/f19ea20860.js" crossorigin="anonymous"></script>
    <style>
        *{
            font-family: "Source Sans Pro", "Arial", sans-serif;
        }

        nav{
            display: flex;
            flex-direction: column;
            font-size: 20px;
            align-items: left;
            
        }

        nav div{
            max-width: fit-content;
            margin-bottom: 10px;
            padding: 10px;
            background-color: white;
            border-radius: 5px;
        }

        nav div:hover{
            background-color: #F0F2F5;
        }
        
        a{
            text-decoration: none;
            color: black;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <nav>
            <i class="fa fa-instagram" aria-hidden="true" style="margin-bottom: 10px;"></i>
            <div>
                <i class="fa-regular fa-house"></i>
                <a href="">Home</a>
            </div>
            <div>
                <i class="fa-regular fa-circle-play"></i>
                <a href="">Reels</a>
            </div>
            <div>
                <i class="fa-regular fa-paper-plane"></i>
                <a href="">Messages</a>
            </div>
            <div>
                <i class="fa fa-search" aria-hidden="true"></i>
                <a href="">Search</a>
            </div>
            <div>
                <i class="fa-regular fa-heart"></i>
                <a href="">Notifications</a>
            </div>
            <div>
                <i class="fa-regular fa-square-plus"></i>
                <a href="">Create</a>
            </div>
            <div>
                <i class="fa-regular fa-circle-user"></i>
                <a href="">Profile</a>
            </div>
            <div>
                <i class="fa fa-sign-out" aria-hidden="true"></i>
                <a href="">Logout</a>
            </div>
        </nav>
    </div>


    {% block content %}
    {% endblock %}
</body>
</html>
