<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social</title>
    <script src="https://kit.fontawesome.com/f19ea20860.js" crossorigin="anonymous"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        * {
            font-family: "Source Sans Pro", "Arial", sans-serif;
        }

        nav {
            display: flex;
            flex-direction: column;
            font-size: 20px;
            align-items: left;

        }

        nav div {
            max-width: fit-content;
            margin-bottom: 10px;
            padding: 10px;
            background-color: white;
            border-radius: 5px;
        }

        nav div:hover {
            background-color: #F0F2F5;
        }

        a {
            text-decoration: none;
            color: black;
        }

        .sidebar {
            position: fixed;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            display: none;
            z-index: 999;
        }

        /* STEP 1 */

        .create-modal {
            width: 550px;
            height: 650px;
            background: white;

            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);

            border-radius: 15px;
            overflow: hidden;
        }

        .modal-header {
            border-bottom: 1px solid #ddd;
            text-align: center;
            padding: 15px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        .upload-content {
            height: 90%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .upload-content button {
            background: #4c68ff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* STEP 2 */

        .preview-modal {
            display: none;

            width: 900px;
            height: 600px;

            background: white;

            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);

            border-radius: 15px;
            overflow: hidden;
        }

        .preview-header {
            height: 60px;
            border-bottom: 1px solid #ddd;

            display: flex;
            align-items: center;
            justify-content: space-between;

            padding: 0 15px;
        }

        .preview-header h3 {
            margin: 0;
        }

        .share-btn {
            border: none;
            background: none;
            color: #0095f6;
            font-weight: bold;
            cursor: pointer;
        }

        .preview-body {
            display: flex;
            height: calc(100% - 60px);
        }

        /* LEFT SIDE */

        .image-section {
            width: 60%;
            background: black;

            position: relative;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-section img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);

            width: 35px;
            height: 35px;

            border: none;
            border-radius: 50%;

            background: white;
            cursor: pointer;
        }

        .left {
            left: 10px;
        }

        .right {
            right: 10px;
        }

        /* RIGHT SIDE */

        .form-section {
            width: 40%;
            border-left: 1px solid #ddd;

            display: flex;
            flex-direction: column;

            padding: 20px;
        }

        .user-info {
            display: flex;
            flex-direction: row;
            justify-content: left;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 180px;

            resize: none;

            border: none;
            outline: none;

            font-size: 15px;
        }

        input[type=text] {
            margin-top: 20px;

            padding: 12px;

            border: none;
            border-top: 1px solid #ddd;
            outline: none;
        }

        .loader-screen,
        .success-screen {
            display: none;
            height: calc(100% - 60px);

            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 60px;
            height: 60px;

            border: 5px solid #ddd;
            border-top: 5px solid #0095f6;

            border-radius: 50%;

            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .success-icon {
            width: 90px;
            height: 90px;

            border-radius: 50%;
            border: 4px solid #ff0080;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 50px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <nav>
            <i class="fa fa-instagram" aria-hidden="true" style="margin-bottom: 10px;"></i>
            <div>
                <i class="fa-regular fa-house"></i>
                <a href="{% url 'home' %}">Home</a>
            </div>
            <div>
                <i class="fa-regular fa-circle-play"></i>
                <a href="#">Reels</a>
            </div>
            <div>
                <i class="fa-regular fa-paper-plane"></i>
                <a href="#">Messages</a>
            </div>
            <div>
                <i class="fa fa-search" aria-hidden="true"></i>
                <a href="#">Search</a>
            </div>
            <div>
                <i class="fa-regular fa-heart"></i>
                <a href="#">Notifications</a>
            </div>
            <div>
                <i class="fa-regular fa-square-plus"></i>
                <a href="#" onclick="showCreateModal()">Create</a>
            </div>
            <div>
                <i class="fa-regular fa-circle-user"></i>
                <a href="{% url 'profile' %}">Profile</a>
            </div>
            <div>
                <i class="fa fa-sign-out" aria-hidden="true"></i>
                <a href="#">Logout</a>
            </div>
        </nav>
    </div>
    {% block content %}
    {% endblock %}

    <div class="modal-overlay" id="modalOverlay">

        <div class="create-modal" id="uploadModal">

            <div class="modal-header">
                <h3 id="modalTitle">Create new post</h3>
                <i style="cursor: pointer;" class="fa-solid fa-x" onclick="closeModal()"></i>
            </div>


            <div class="upload-content">
                <i class="fa-regular fa-images upload-icon"></i>

                <h2>Drag photos and videos here</h2>

                <input type="file" id="fileInput" multiple hidden>

                <button onclick="document.getElementById('fileInput').click()">
                    Select From Computer
                </button>
            </div>

        </div>

        <div class="preview-modal" id="previewModal">

            <div class="preview-header">
                <i class="fa-solid fa-arrow-left" id="backBtn" onclick="goBack()"></i>

                <h3>Create new post</h3>

                <button class="share-btn" id="shareBtn">
                    Share
                </button>
            </div>

            <div class="preview-body" id="previewContent">

                <div class="image-section">

                    <button class="nav-btn left" onclick="prevImage()">
                        ❮
                    </button>

                    <img id="previewImage">

                    <button class="nav-btn right" onclick="nextImage()">
                        ❯
                    </button>

                </div>

                <div class="form-section">

                    <div class="user-info">
                        <img style="height: 30px; width: 30px; border: none; border-radius: 25px;"
                            src="{{user.profile_pic.url}}" alt="Profile">
                        <strong>{{user.username}}</strong>
                    </div>

                    <form action="" method="post">
                        {% csrf_token %}
                        <textarea id="caption" placeholder="Write a caption..."></textarea>
    
                        <input type="text" id="location" placeholder="Add location">
                    </form>

                </div>

            </div>

            <div class="loader-screen" id="loaderScreen">
                <div class="spinner"></div>
                <p>Sharing post...</p>
            </div>

            <div class="success-screen" id="successScreen">
                <div class="success-icon">✓</div>
                <h2>Your post has been shared.</h2>
            </div>

        </div>

    </div>


    <script>
        const fileInput = document.getElementById("fileInput");

        const uploadModal = document.getElementById("uploadModal");
        const previewModal = document.getElementById("previewModal");

        const previewImage = document.getElementById("previewImage");

        let selectedImages = [];
        let currentIndex = 0;

        function closeModal() {
            console.log('aaaa')
            uploadModal.style.display = "none";
            document.getElementById("modalOverlay").style.display = "none";
        }

        function showCreateModal() {
            document.getElementById("modalOverlay").style.display = "block";
            uploadModal.style.display = "block";
            previewModal.style.display = "none";
        }

        fileInput.addEventListener("change", function () {

            selectedImages = [];

            [...this.files].forEach(file => {
                selectedImages.push(URL.createObjectURL(file));
            });

            if (selectedImages.length) {

                currentIndex = 0;

                previewImage.src = selectedImages[0];

                uploadModal.style.display = "none";
                previewModal.style.display = "block";
            }
        });

        function nextImage() {

            if (selectedImages.length <= 1) return;

            currentIndex++;

            if (currentIndex >= selectedImages.length) {
                currentIndex = 0;
            }

            previewImage.src = selectedImages[currentIndex];
        }

        function prevImage() {

            if (selectedImages.length <= 1) return;

            currentIndex--;

            if (currentIndex < 0) {
                currentIndex = selectedImages.length - 1;
            }

            previewImage.src = selectedImages[currentIndex];
        }

        function goBack() {

            previewModal.style.display = "none";
            uploadModal.style.display = "block";

            fileInput.value = "";
        }

        document.getElementById("shareBtn").addEventListener("click", sharePost);

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        async function sharePost() {

            const files = document.getElementById("fileInput").files;

            const caption =
                document.getElementById("caption").value;

            const location =
                document.getElementById("location").value;

            const formData = new FormData();

            formData.append("caption", caption);
            formData.append("location", location);

            for (let i = 0; i < files.length; i++) {
                formData.append("images", files[i]);
            }

            // Hide preview
            document.getElementById("previewContent").style.display = "none";

            // Show loader
            document.getElementById("loaderScreen").style.display = "flex";

            document.getElementById("modalTitle").innerText = "Sharing";
            document.getElementById("shareBtn").style.display = "none";
            document.getElementById("backBtn").style.display = "none";

            try {

                const response = await fetch("/home/create/post/", {
                    method: "POST",
                    headers: {
                        "X-CSRFToken": getCookie("csrftoken"),
                    },
                    body: formData
                });

                if (!response.ok) {
                    throw new Error("Upload failed");
                }

                // Loader -> Success
                document.getElementById("loaderScreen").style.display = "none";
                document.getElementById("successScreen").style.display = "flex";

                document.getElementById("modalTitle").innerText = "Post shared";

                const shareBtn = document.getElementById("shareBtn");

                shareBtn.innerText = "Done";
                shareBtn.style.display = "block";

                shareBtn.onclick = function () {

                    document.getElementById("modalOverlay").style.display = "none";

                    // reset
                    document.getElementById("successScreen").style.display = "none";
                    document.getElementById("previewContent").style.display = "flex";

                    document.getElementById("modalTitle").innerText = "Create new post";

                    shareBtn.innerText = "Share";
                    shareBtn.style.display = "block";
                    
                    document.getElementById("backBtn").style.display = "block";
                    
                    window.location.reload();

                };

            }
            catch (error) {

                document.getElementById("loaderScreen").style.display = "none";
                document.getElementById("previewContent").style.display = "flex";

                document.getElementById("shareBtn").style.display = "block";
                document.getElementById("backBtn").style.display = "block";

                document.getElementById("modalTitle").innerText = "Create new post";

                alert(error.message);
            }
        }
    </script>


</body>


</html>
